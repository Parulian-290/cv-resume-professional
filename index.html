<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adv. JH. Parulian Sipahutar, S.H., CLA | Executive Profile</title>
    <!-- Tailwind CSS Terintegrasi Penuh -->
    <script src="https://tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { gold: '#D4AF37', darkNavy: '#0A1128', deepSlate: '#1C2541' } } } }
    </script>
    <!-- FontAwesome Vector Graphics & Icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        .lang-en, .lang-id { transition: all 0.2s ease; }
        .hidden-lang { display: none !important; }
    </style>
</head>
<body class="bg-darkNavy text-slate-100 font-sans antialiased min-h-screen">
    <!-- Header (Bilingual Navigation) -->
    <header class="border-b border-slate-800 bg-slate-950/90 backdrop-blur sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-6 py-5 flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 class="text-2xl font-bold tracking-wide text-white border-l-4 border-gold pl-3">Adv. JH. Parulian Sipahutar, S.H., CLA</h1>
                <p class="text-gold font-semibold uppercase tracking-wider text-xs mt-1">Advocate | Certified Legal Auditor | Telecom Infrastructure Specialist</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="bg-slate-900 border border-slate-800 rounded-lg p-1 flex gap-1">
                    <button onclick="setLanguage('id')" id="btn-id" class="px-4 py-1 text-xs font-bold rounded bg-gold text-darkNavy">ID</button>
                    <button onclick="setLanguage('en')" id="btn-en" class="px-4 py-1 text-xs font-bold rounded text-slate-400 hover:text-white">EN</button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-12 space-y-12">
        <!-- Executive Summary -->
        <section class="bg-deepSlate border border-slate-800 rounded-xl p-6 md:p-8">
            <h2 class="text-lg font-bold text-white mb-4 uppercase tracking-wider flex items-center gap-2">
                <i class="fas fa-user-tie text-gold"></i>
                <span class="lang-id">Ringkasan Eksekutif</span><span class="lang-en hidden-lang">Executive Summary</span>
            </h2>
            <p class="text-slate-300 leading-relaxed text-sm lang-id">Profesional senior dengan rekam jejak 24 tahun...</p>
            <p class="text-slate-300 leading-relaxed text-sm lang-en hidden-lang">Senior executive professional with over 24 years...</p>
        </section>

        <!-- Dynamic Content Feed -->
        <section class="bg-deepSlate border border-slate-800 rounded-xl p-6 md:p-8">
            <h2 class="text-lg font-bold text-white mb-6 uppercase tracking-wider flex items-center gap-2">
                <i class="fas fa-terminal text-gold"></i>
                <span class="lang-id">Bukti Portofolio Sistem AI</span><span class="lang-en hidden-lang">Live AI Portfolio</span>
            </h2>
            <div id="devotional-container" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="col-span-3 text-center text-slate-400 py-12"><i class="fas fa-circle-notch fa-spin text-gold text-2xl"></i></div>
            </div>
        </section>
    </main>

    <script>
        function setLanguage(lang) {
            const elEn = document.querySelectorAll('.lang-en'), elId = document.querySelectorAll('.lang-id'), btnEn = document.getElementById('btn-en'), btnId = document.getElementById('btn-id');
            if (lang === 'en') {
                elEn.forEach(el => el.classList.remove('hidden-lang')); elId.forEach(el => el.classList.add('hidden-lang'));
                btnEn.className = "px-4 py-1 text-xs font-bold rounded bg-gold text-darkNavy"; btnId.className = "px-4 py-1 text-xs font-bold rounded text-slate-400";
            } else {
                elId.forEach(el => el.classList.remove('hidden-lang')); elEn.forEach(el => el.classList.add('hidden-lang'));
                btnId.className = "px-4 py-1 text-xs font-bold rounded bg-gold text-darkNavy"; btnEn.className = "px-4 py-1 text-xs font-bold rounded text-slate-400";
            }
        }
        // Simplified fetch logic for demonstration
        async function runPipeline() {
            const container = document.getElementById('devotional-container');
            container.innerHTML = '<div class="col-span-3 text-center text-green-400">Pipeline Connected. Fetching data...</div>';
            // Note: The full logic with fallback mechanism is included in the source file
        }
        document.addEventListener('DOMContentLoaded', runPipeline);
    </script>
</body>
</html>
